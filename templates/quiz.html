<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quiz — Fishing for Phishing</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet"/>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="scanline"></div>

  <nav class="navbar">
    <div class="nav-logo">
      <span class="logo-icon">👾</span>
      <span class="logo-text">FISHING FOR <span class="accent">PHISHING</span></span>
    </div>
    <ul class="nav-links">
      <li><a href="/">Detector</a></li>
      <li><a href="/learn">Learn</a></li>
      <li><a href="/quiz">Quiz</a></li>
    </ul>
  </nav>

  <section class="page-hero">
    <h1 class="hero-title">Can You <span class="accent">Spot</span> the Phish?</h1>
    <p class="hero-subtitle">Test your phishing detection skills — 8 questions</p>
  </section>

  <section class="quiz-section">
    <!-- Progress Bar -->
    <div class="quiz-progress-wrap">
      <div class="quiz-progress-bar">
        <div id="progressFill" class="progress-fill" style="width:0%"></div>
      </div>
      <span id="progressText" class="progress-text">Question 1 of 8</span>
    </div>

    <!-- Score Display -->
    <div class="score-display">
      Score: <span id="scoreDisplay">0</span> / <span id="totalDisplay">8</span>
    </div>

    <!-- Question Card -->
    <div id="questionCard" class="question-card">
      <div id="questionBadge" class="question-badge"></div>
      <p id="questionText" class="question-text"></p>
      <div id="optionsContainer" class="options-container"></div>
      <div id="explanation" class="explanation hidden"></div>
      <button id="nextBtn" class="btn-next hidden">Next Question →</button>
    </div>

    <!-- Results Screen -->
    <div id="resultsScreen" class="results-screen hidden">
      <div id="resultIcon" class="result-icon"></div>
      <h2 id="resultTitle" class="result-title"></h2>
      <p id="resultDesc" class="result-desc"></p>
      <div id="finalScore" class="final-score"></div>
      <div class="result-breakdown" id="resultBreakdown"></div>
      <button onclick="resetQuiz()" class="btn-analyze" style="margin-top:2rem">🔄 Try Again</button>
      <a href="/learn" class="btn-secondary" style="margin-top:1rem;display:block;text-align:center">📚 Study the Guide</a>
    </div>
  </section>

  <footer class="footer">
    <p>Team CyberVerse - Fishing for Phishing</p>
  </footer>

  <script src="/static/js/quiz.js"></script>
</body>

</html>
